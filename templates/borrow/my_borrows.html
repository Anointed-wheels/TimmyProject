{% extends "base.html" %}
{% block content %}

<h2>My Borrowed Books</h2>

<table>
<tr>
<th>Book</th>
<th>Status</th>
<th>Due Date</th>
<th>Fine</th>
<th>Actions</th>
</tr>

{% for r in records %}
<tr>
<td>{{ r.book.title }}</td>
<td>{{ r.status }}</td>
<td>{{ r.due_date }}</td>
<td>₦{{ r.fine }}</td>

<td>
    {% if r.status == "pending" %}
        <a href="{% url 'cancel_request' r.id %}" class="btn-danger">Cancel</a>
    {% endif %}
</td>

</tr>
{% endfor %}
</table>

{% endblock %}
