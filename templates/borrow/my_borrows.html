{% extends "base.html" %}
{% block content %}

<h2>My Borrowed Books</h2>

<table>
<tr>
<th>Book</th>
<th>Status</th>
<th>Due Date</th>
<th>Fine</th>
</tr>

{% for r in records %}
<tr>
<td>{{ r.book.title }}</td>
<td>{{ r.status }}</td>
<td>{{ r.due_date }}</td>
<td>₦{{ r.fine }}</td>
</tr>
{% endfor %}

</table>

{% endblock %}
