{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="login-page">

    <div class="login-card">

        <h2>Welcome Back</h2>
        <p>Login to your Digital Library account</p>

        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">
                <label>Email</label>
                {{ form.email }}
            </div>

            <div class="form-group">
                <label>Password</label>
                {{ form.password }}
            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

        <p class="login-bottom">
            Don't have an account?
            <a href="{% url 'register' %}">Register</a>
        </p>

    </div>

</div>

{% endblock %}
